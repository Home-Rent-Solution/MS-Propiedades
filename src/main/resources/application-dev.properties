# Base de datos MySQL de desarrollo
spring.datasource.url=jdbc:mysql://localhost:3306/db_propiedades_dev
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Estrategia de Hibernate para desarrollo
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Comunicación entre microservicios (Feign) en desarrollo
ms.anfitriones.url=http://localhost:8082

# Documentación interactiva con Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html